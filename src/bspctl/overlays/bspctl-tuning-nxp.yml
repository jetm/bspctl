# NXP i.MX tuning overlay.
#
# Layered on top of a topology-only kas YAML by `bspctl build`. Carries
# every optimization that used to be baked into the gen-kas output
# (ccache wiring, fetch robustness, MIRRORS, PREMIRRORS, FETCHCMD_wget,
# the renderdoc CMake launcher fix) plus the BSP-local override layer
# at meta-varis-overrides.
#
# kas merges local_conf_header.<key> and repos.<name> by name, so the
# user's machine/distro/target/repos stay intact while these knobs are
# unioned in.

header:
  version: 21

# PYTHONMALLOC=malloc is the round 11 Phase 2 ceiling fix
# (drops 3.14.4 GIL race rate ~50% -> ~5%). kas auto-appends each
# declared env var to BB_ENV_PASSTHROUGH_ADDITIONS at libkas.py:507,
# so bitbake's clean_environment lets it through to parser-pool
# workers. Host env wins on override.
env:
  PYTHONMALLOC: malloc

local_conf_header:
  bspctl-tuning: |
    CCACHE_DIR = "/work/ccache"
    INHERIT += "ccache"
    BB_NUMBER_THREADS = "${@os.environ.get('NPROC', '16')}"
    PARALLEL_MAKE = "-j ${@os.environ.get('NPROC', '16')}"
    BB_NUMBER_PARSE_THREADS = "${@os.environ.get('NPROC', '16')}"

    BB_DISKMON_DIRS = " \
        STOPTASKS,${TMPDIR},1024,100K \
        ABORT,${TMPDIR},512,50K \
        STOPTASKS,${DL_DIR},1024,100K \
        ABORT,${DL_DIR},512,50K \
    "

    BB_PRESSURE_MAX_CPU = "${@os.environ.get('BB_PRESSURE_MAX_CPU', '')}"
    BB_PRESSURE_MAX_IO = "${@os.environ.get('BB_PRESSURE_MAX_IO', '')}"
    BB_PRESSURE_MAX_MEMORY = "${@os.environ.get('BB_PRESSURE_MAX_MEMORY', '')}"

    BB_SCHEDULER = "${@os.environ.get('BB_SCHEDULER', '')}"
    IMAGE_FEATURES:remove = "dev-pkgs dbg-pkgs tools-sdk tools-debug staticdev-pkgs"

    # Fetch robustness: raise the per-URI timeout so transient TLS / DNS
    # stalls do not trip the default (~45s) and fail the task.
    BB_FETCH_TIMEOUT = "600"

    # Replace scarthgap's default MIRRORS table (which hardcodes the dead
    # sources.openembedded.org host) with a curated catch-all pointing at
    # the Yocto Project source mirror. Bitbake consults MIRRORS on the
    # fallback phase if the original URI failed.
    MIRRORS = " \
        git://.*/.*     http://downloads.yoctoproject.org/mirror/sources/ \n \
        http://.*/.*    http://downloads.yoctoproject.org/mirror/sources/ \n \
        https://.*/.*   http://downloads.yoctoproject.org/mirror/sources/ \n \
        ftp://.*/.*     http://downloads.yoctoproject.org/mirror/sources/ \n \
    "

    # Try the yocto mirror BEFORE hitting github.com; this turns github
    # outages into silent fallbacks instead of build blockers. Falls
    # through to the original URI on miss.
    PREMIRRORS:prepend = " \
        git://github.com/.*/.*    http://downloads.yoctoproject.org/mirror/sources/ \n \
        http://github.com/.*/.*   http://downloads.yoctoproject.org/mirror/sources/ \n \
        https://github.com/.*/.*  http://downloads.yoctoproject.org/mirror/sources/ \n \
    "

    ACCEPT_FSL_EULA = "1"

    # Disable ccache for recipes with upstream cmake bugs around
    # CMAKE_CXX_COMPILER_LAUNCHER. renderdoc-1.27's meta-oe recipe has an
    # add_custom_command that uses the CXX compiler var as a literal shell
    # token; when the launcher prefix is active the command expands to
    # "ccache g++" quoted as a single argv[0], which /bin/sh cannot resolve.
    # renderdoc is an RDEPENDS of packagegroup-fsl-tools-gpu-external so it
    # must build; CCACHE_DISABLED:pn-renderdoc is not sufficient because
    # cmake.bbclass bakes the CMAKE_*_COMPILER_LAUNCHER variables from
    # INHERIT += ccache at parse time. Clear those vars directly for this
    # recipe only.
    CMAKE_CXX_COMPILER_LAUNCHER:pn-renderdoc = ""
    CMAKE_C_COMPILER_LAUNCHER:pn-renderdoc = ""

    # crates.io returns HTTP 403 Forbidden to wget's default "Wget/*" User-Agent
    # on its Fastly endpoints, breaking every rust recipe in meta-virtualization
    # (vhost-device-vsock, aardvark-dns, netavark, virtiofsd, and the rest of
    # their crate:// fetches). Other CDN endpoints serve it fine, which is why
    # cargo itself and even some host-network wget runs work - routing is the
    # deciding factor. Override FETCHCMD_wget fully (bitbake's wget fetcher
    # keeps this var unset and falls back to a hardcoded default in Python;
    # :append leaves no wget binary in the command).
    FETCHCMD_wget = "/usr/bin/env wget --tries=2 --timeout=100 -U 'bitbake/2.0'"

    PREMIRRORS:prepend = "git://github.com/varigit/linux-imx.* git:///work/forks/linux-imx;protocol=file \n "

repos:
  meta-varis-overrides:
    path: meta-varis-overrides
    layers:
      .:
